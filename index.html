    <h1>Numera — Sistemas, Automações e Treinamentos em Dados</h1>
    <p>A Numera é uma empresa de tecnologia que desenvolve sistemas sob medida, automações de processos, dashboards e treinamentos em dados para empresas brasileiras. Atendemos construção civil, engenharia, logística, varejo e serviços em todo o Brasil.</p>
    <h2>O que fazemos</h2>
    <p>Processos manuais, retrabalho e decisões sem dados custam tempo que o seu negócio não pode desperdiçar. Mapeamos o que trava a sua operação e entregamos a solução mais eficiente para o seu contexto — seja um dashboard, uma automação, um sistema completo ou um treinamento para a equipe.</p>
    <h2>Nossos serviços</h2>
    <p><strong>Automação e Otimização:</strong> Dashboards conectados aos seus dados, automações que eliminam retrabalho e sistemas internos sob medida para controle de operações.</p>
    <p><strong>Treinamentos Corporativos:</strong> Capacitação prática em SQL, Python, Business Intelligence e automação, usando os dados reais da sua empresa como caso de estudo.</p>
    <p><strong>Consultoria e Planejamento Estratégico:</strong> Diagnóstico do ambiente analítico, organização de indicadores e clareza sobre onde focar esforço para ter resultado.</p>
    <h2>Cases de sucesso</h2>
    <p>Desenvolvemos sistemas de controle de entregas que zeraram retrabalho por falta de informação, alertas automáticos de ruptura de estoque, painéis de análise de insumos em tempo real, relatórios de KPI unificados para gestão de obras e programas de capacitação em dados que tornaram equipes autônomas.</p>
