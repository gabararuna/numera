    <div class="section">
      <h1>Numera — Sistemas, Automações e Treinamentos em Dados</h1>
      <p>Faça a sua operação atingir o ápice. Nós sabemos como chegar lá.</p>
      <p>Processos manuais, retrabalho e decisões sem dados custam tempo que o seu negócio não pode desperdiçar. A Numera mapeia o que trava a sua operação e entrega a solução mais eficiente para o seu contexto — seja um dashboard, uma automação, um sistema completo ou um treinamento para a equipe.</p>
    </div>

    <!-- ── NOSSOS SERVIÇOS ── -->
    <div class="section">
      <h2>Nossos Serviços</h2>
      <p>Mais produtividade, menos retrabalho e decisões melhores para o seu negócio.</p>

      <h3>Automação e Otimização de Processos</h3>
      <p>Mapeamos o que trava a sua operação e construímos a solução mais eficiente para o seu contexto — seja um dashboard conectado aos dados reais, uma automação que elimina horas de consolidado manual ou um sistema interno que substitui uma planilha crítica.</p>
      <ul>
        <li>Dashboards conectados a dados reais, atualizados automaticamente</li>
        <li>Automações de alertas, relatórios e cruzamentos de bases</li>
        <li>Sistemas internos que substituem planilhas críticas</li>
        <li>Integrações entre ferramentas sem retrabalho de redigitação</li>
      </ul>

      <h3>Treinamentos Corporativos em Dados</h3>
      <p>Sua equipe aprende fazendo, com capacitação prática em SQL, Python, BI e automação usando os dados reais da empresa. O resultado é aprendizado que cola: as pessoas saem do treinamento sabendo exatamente como aplicar o que aprenderam no trabalho de amanhã.</p>
      <ul>
        <li>SQL — de consultas básicas a relatórios analíticos com o seu banco de dados</li>
        <li>Python — automação e manipulação de dados para não-desenvolvedores</li>
        <li>Business Intelligence — Power BI e Looker Studio do básico ao avançado</li>
        <li>Google Sheets + Apps Script — automação sem infraestrutura complexa</li>
      </ul>

      <h3>Planejamento Estratégico em Dados</h3>
      <p>Decisões certas começam com indicadores confiáveis. Diagnosticamos seu ambiente analítico, organizamos os KPIs que fazem sentido para a sua operação e estruturamos relatórios que a gestão consegue usar para decidir, não apenas para apresentar em reunião.</p>
      <ul>
        <li>Diagnóstico completo do ambiente analítico e das fontes de dados</li>
        <li>Arquitetura de KPIs que refletem o que importa para a operação</li>
        <li>Relatórios e painéis que a gestão realmente consegue usar</li>
        <li>Acompanhamento da implementação até o resultado concreto</li>
      </ul>
    </div>

    <!-- ── CASES DE SUCESSO ── -->
    <div class="section">
      <h2>Cases de Sucesso</h2>
      <p>Veja como ajudamos empresas reais a trabalhar melhor e entregar mais.</p>

      <h3>Controle de Entregas</h3>
      <p>Desenvolvemos um sistema para acompanhar a execução dos contratos desde a abertura até a entrega final. Antes, a gestão dependia de e-mail e planilhas desatualizadas. Hoje, o status de cada entrega está disponível em tempo real para toda a equipe.</p>

      <h3>Alertas de Ruptura de Estoque</h3>
      <p>Mapeamos os dados do banco de insumos e criamos alertas automáticos para materiais com risco de falta. O sistema monitora os níveis continuamente e notifica o responsável antes que a ruptura aconteça — eliminando paradas não planejadas na produção.</p>

      <h3>Capacitação em Dados</h3>
      <p>Levamos a equipe de planilhas compartilhadas para um sistema com banco de dados, SQL e BI. Analistas que antes levavam dois dias para preparar um relatório passaram a entregar análises em menos de uma hora, de forma autônoma e sem depender de TI.</p>

      <h3>Gestão de Insumos em Obras</h3>
      <p>Criamos um sistema para controlar os indicadores de insumos das obras em tempo real, com painel atualizado automaticamente a partir dos dados do ERP. A gestão passou a ter visibilidade de consumo, desperdício e saldo disponível por obra, sem consolidação manual.</p>

      <h3>Painel de Ciclo de Vida de Insumos</h3>
      <p>Construímos um painel com o ciclo de vida completo dos insumos, do pedido ao consumo em campo. A equipe de suprimentos passou a ter visibilidade de cada etapa do processo — da solicitação à entrega na obra — em um único painel centralizado.</p>

      <h3>Unificação de KPIs de Obras</h3>
      <p>Unimos as métricas dispersas de vários projetos em um único relatório de KPIs de obras, com atualização automática e visão consolidada de prazo, custo e produtividade. A diretoria passou a ter uma visão clara do portfólio sem depender de relatórios manuais mensais.</p>
    </div>

    <!-- ── SOBRE A NUMERA ── -->
    <div class="section">
      <h2>Sobre a Numera</h2>

      <h3>Quem somos</h3>
      <p>A Numera é uma empresa de tecnologia fundada por profissionais de engenharia e ciência de dados com experiência nos setores industrial, logístico e de serviços. Nascemos da percepção de que a maioria das empresas brasileiras ainda opera com processos manuais, planilhas desconexas e decisões baseadas em intuição — quando a tecnologia para mudar isso já existe, está disponível e ao alcance de qualquer negócio disposto a usá-la com método.</p>
      <p>Nosso trabalho começa antes do código. Começa entendendo o problema real da operação: onde está o gargalo, quem sofre com ele todos os dias, qual dado já existe mas não está sendo aproveitado. A partir daí, construímos a solução mais eficiente para aquele contexto específico — seja um dashboard conectado aos dados reais, uma automação que elimina horas de consolidado manual, um sistema interno que substitui uma planilha crítica ou um programa de capacitação que torna a equipe autônoma em dados.</p>
      <p>Atendemos empresas em todo o Brasil, com foco em construção civil, engenharia, logística, varejo e serviços — setores onde dados e processos têm impacto direto no resultado operacional.</p>

      <h3>Nossa missão</h3>
      <p>Não acreditamos em soluções genéricas. Cada projeto é construído do zero para o problema real do cliente, com foco em entrega prática, transferência de conhecimento e resultado mensurável. Uma solução que a equipe não usa não é uma solução — por isso investimos tanto no processo de adoção e capacitação quanto na construção técnica.</p>
      <p>Valorizamos clareza sobre o escopo antes de iniciar qualquer trabalho, honestidade técnica sobre o que é e o que não é possível, e impacto real como única métrica de sucesso. Não vendemos projeto — entregamos resultado.</p>

      <h3>Como trabalhamos</h3>
      <p><strong>Mapear antes de construir:</strong> Antes de escrever uma linha de código, entendemos o processo, os dados disponíveis e o resultado esperado. Isso evita construir a solução certa para o problema errado — o erro mais caro em tecnologia.</p>
      <p><strong>Construir para ser usado:</strong> Sistemas complicados não são usados. Priorizamos interfaces claras, fluxos simples e documentação para que a equipe do cliente opere tudo de forma autônoma — sem precisar chamar ninguém para o dia a dia.</p>
      <p><strong>Transferir o conhecimento:</strong> Não entregamos caixas-pretas. Ao final de cada projeto, a equipe entende o que foi construído, como mantê-lo e como evoluí-lo. A Numera gera capacidade, não dependência.</p>

    <!-- ── PROCESSO ── -->
    <div class="section">
      <h2>Como funciona na prática</h2>
      <p>O processo em quatro etapas.</p>
      <h3>Etapa 01 — Diagnóstico</h3>
      <p>Reunião de mapeamento, levantamento dos dados disponíveis, entendimento do processo atual e identificação clara do problema real. Sem diagnóstico, não há projeto.</p>
      <h3>Etapa 02 — Projeto</h3>
      <p>Definição do escopo exato, entregáveis, prazo e métricas de sucesso — documentado e aprovado antes de qualquer linha de código. O que vai ser entregue fica claro desde o início.</p>
      <h3>Etapa 03 — Entrega</h3>
      <p>Construção iterativa com validações periódicas com a equipe. Ajustes de rota acontecem durante — não depois — da entrega. O resultado final não é surpresa.</p>
      <h3>Etapa 04 — Transferência</h3>
      <p>Treinamento da equipe, documentação completa e entrega formal. O cliente sai sabendo usar, manter e evoluir tudo que foi construído — sem depender da Numera no dia a dia.</p>
    </div>

    <div class="section">
      <h2>Perguntas Frequentes</h2>
      <p>Respostas diretas sobre como a Numera trabalha.</p>

      <h3>O que exatamente a Numera faz?</h3>
      <p>Desenvolvemos sistemas personalizados, dashboards, automações e treinamentos em dados para empresas que precisam de mais eficiência operacional. Não vendemos software pronto: cada entrega é construída do zero para o problema real do cliente, sem funcionalidade desnecessária.</p>

      <h3>Para quais setores vocês atendem?</h3>
      <p>Atendemos principalmente empresas de construção civil, engenharia, logística, varejo e serviços. Nossa metodologia é agnóstica de setor — onde há dado e processo, há oportunidade de melhoria. Se você tem um problema operacional, vale conversar.</p>

      <h3>Qual é o prazo médio de um projeto?</h3>
      <p>Projetos de automação e dashboards têm prazo de 3 a 8 semanas, dependendo da complexidade. Treinamentos corporativos podem ser concluídos em 2 a 4 semanas. Sempre definimos o prazo antes de iniciar — sem surpresas no meio do caminho.</p>

      <h3>Vocês trabalham de forma remota?</h3>
      <p>Sim. Toda a nossa operação é remota, com comunicação estruturada, entregas documentadas e reuniões de acompanhamento periódicas. Quando necessário e acordado previamente, realizamos visitas presenciais em São Luís e região.</p>

      <h3>Preciso ter equipe de TI para contratar?</h3>
      <p>Não. Nossos projetos são desenhados para operar sem dependência de TI interna. Ao final de cada entrega, treinamos a equipe do cliente para usar, manter e evoluir o que foi construído — a Numera gera capacidade, não dependência.</p>

      <h3>Como começa um projeto com a Numera?</h3>
      <p>Com uma conversa sem compromisso. Você nos conta o problema, a gente entende o contexto e responde com uma proposta clara em até 48 horas úteis. Sem formulário burocrático, sem sequência de e-mails automáticos — direto ao ponto.</p>

      <h3>Como funciona a primeira reunião?</h3>
      <p>É uma conversa de 30 a 45 minutos, sem compromisso e sem apresentação. Você explica o problema e a gente responde com clareza sobre o que é possível fazer, qual seria o escopo, quanto tempo levaria e qual seria o próximo passo concreto.</p>

      <h3>Vocês atendem empresas de qualquer porte?</h3>
      <p>Sim. Atendemos desde times pequenos de 3 a 5 pessoas que precisam de uma automação específica até empresas com centenas de funcionários. O escopo e o investimento se ajustam ao contexto.</p>

      <h3>Qual é o prazo para receber uma proposta?</h3>
      <p>Até 48 horas úteis após a primeira conversa ou mensagem com contexto suficiente. Não trabalhamos com fila de espera.</p>

      <p>Sistemas reais, criados do zero para resolver problemas reais.</p>

      <h3>Cronos — Controle de Banco de Horas</h3>
      <p>Controla banco de horas com banco de dados próprio, login e ciclos configuráveis. Ideal para empresas que precisam de controle preciso de jornada sem depender de planilhas.</p>

      <h3>Monno — Gestão Financeira Pessoal</h3>
      <p>Gestão financeira pessoal com categorização automática, planejamento por período e análise preditiva. Acompanhe receitas, despesas e tendências em um só lugar.</p>

      <h3>Estica Férias — Calculadora de Férias</h3>
      <p>Descubra os melhores períodos para tirar férias com base em feriados e fins de semana. Maximize seus dias de descanso com planejamento inteligente.</p>

      <h3>Remunera — Comparador de Remuneração</h3>
      <p>Compare a remuneração real de CLT, PJ e servidores públicos com os lançamentos do ano. Saiba qual modalidade de trabalho é mais vantajosa para o seu perfil.</p>

      <h3>Habita — Financiar ou Alugar</h3>
      <p>Financiar ou alugar? Descubra a opção mais vantajosa com base nos seus números reais — taxa de juros, prazo, valor do imóvel e rendimento de investimentos.</p>

      <h3>Mega — Investimento de Grande Prêmio</h3>
      <p>Saiba como investir um grande prêmio para preservar e multiplicar o patrimônio ao longo do tempo. Simulações com diferentes perfis e estratégias de alocação.</p>

      <h3>Mobi — Mobilidade Urbana</h3>
      <p>Compare financiamento de veículo, aquisição à vista e aplicativos de transporte e descubra o melhor cenário de mobilidade para o seu perfil e rotina.</p>
